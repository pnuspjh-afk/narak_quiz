<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나락퀴즈쇼 - 동아리 편</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&display=swap');

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Do Hyeon', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .narak-font {
            font-family: 'Black Han Sans', sans-serif;
        }

        .upload-section {
            margin-bottom: 20px;
            background: #222;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #444;
            z-index: 10;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .eye-container {
            position: relative;
            width: 320px;
            height: 240px;
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            margin-bottom: 1.5rem;
            background-color: #111;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .eye-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%);
            transform: scale(3.5);
            transform-origin: center center;
            cursor: move;
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), filter 0.8s ease;
        }

        .revealed .eye-container {
            width: 380px;
            height: 450px;
            border-color: #ff0000;
            box-shadow: 0 0 80px rgba(255, 0, 0, 0.8);
        }

        .revealed .eye-image {
            transform: scale(1) !important;
            margin: 0 !important;
            filter: grayscale(0%) contrast(1.1);
        }

        .impact-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(180, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: flash 0.08s infinite;
        }

        @keyframes flash {
            0% { background: rgba(80, 0, 0, 0.95); }
            50% { background: rgba(180, 0, 0, 1); }
            100% { background: rgba(80, 0, 0, 0.95); }
        }

        .subtitle-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 90%;
            max-width: 800px;
            align-items: center;
            margin-top: 20px;
        }

        .subtitle-box {
            background: rgba(0, 0, 0, 0.95);
            padding: 1.2rem 1.8rem;
            border-left: 12px solid #ff0000;
            text-align: center;
            transform: skew(-2deg);
            box-shadow: 10px 10px 0 rgba(0,0,0,0.7);
            width: 100%;
            animation: slideIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-150px) skew(-2deg); }
            to { opacity: 1; transform: translateX(0) skew(-2deg); }
        }

        .btn-option {
            background: linear-gradient(to bottom, #2d3748, #1a202c);
            border: 1px solid #4a5568;
            padding: 1.2rem 1rem;
            border-radius: 0.5rem;
            font-size: 1.4rem;
            transition: all 0.2s;
            flex: 1;
            max-width: 220px;
            text-align: center;
        }

        .btn-option:hover {
            border-color: #f6ad55;
            background: #2d3748;
            transform: scale(1.05);
        }

        .shock-text {
            color: #fff;
            font-size: 6rem;
            font-style: italic;
            text-shadow: 8px 8px 0 #ff0000;
            letter-spacing: -5px;
            margin-bottom: 1rem;
        }

        .identity-label {
            background: #ff0000;
            color: white;
            padding: 10px 35px;
            font-size: 2.2rem;
            margin-top: -20px;
            margin-bottom: 30px;
            transform: rotate(-3deg);
            display: none;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
            z-index: 110;
        }

        #zoom-controls {
            margin-top: -1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 10px;
        }

        .control-btn {
            background: #444;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid #555;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-6px, -3px); }
            20%, 40%, 60%, 80% { transform: translate(6px, 3px); }
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body id="main-body">

    <!-- Audio Element -->
    <audio id="fail-audio"></audio>

    <!-- Setup Area -->
    <div class="upload-section flex flex-col items-center gap-4" id="setup-area">
        <h2 class="text-xl narak-font text-yellow-500">퀴즈 데이터 설정</h2>
        
        <div class="w-full">
            <label class="block text-xs text-gray-400 mb-1">1. 주인공 이름</label>
            <input type="text" id="target-name" placeholder="이름을 입력하세요" class="w-full bg-black border border-gray-600 px-3 py-2 rounded text-white text-sm focus:border-red-500 outline-none">
        </div>
        
        <div class="w-full">
            <label class="block text-xs text-gray-400 mb-1">2. 사진 파일 선택</label>
            <input type="file" id="file-input" accept="image/*" class="w-full bg-black border border-gray-600 px-3 py-1 rounded text-white text-sm cursor-pointer">
        </div>

        <div class="w-full">
            <label class="block text-xs text-gray-400 mb-1">3. 사운드 파일 선택 (미션실패.mp3)</label>
            <input type="file" id="audio-input" accept="audio/*" class="w-full bg-black border border-gray-600 px-3 py-1 rounded text-white text-sm cursor-pointer">
        </div>

        <button id="save-btn" class="w-full bg-red-700 hover:bg-red-600 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
            <span id="save-text">데이터 저장 및 시작하기</span>
            <div id="save-spinner" class="loading-spinner"></div>
        </button>
        
        <p id="load-msg" class="text-[11px] text-gray-400 text-center">파일 용량이 커도 IndexedDB에 안전하게 저장됩니다.</p>
        <button onclick="clearAllData()" class="text-[10px] text-gray-600 hover:text-red-500 underline">저장된 모든 데이터 삭제하기</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden flex flex-col items-center w-full px-4">
        <h1 class="text-xl mb-4 text-gray-500 tracking-widest uppercase narak-font">Narak Quiz Show</h1>
        
        <div class="eye-container" id="eye-box">
            <img id="target-image" src="" alt="Target Image" class="eye-image" draggable="true">
        </div>

        <div id="zoom-controls">
            <button class="control-btn" onclick="adjustZoom(0.5)">확대 +</button>
            <button class="control-btn" onclick="adjustZoom(-0.5)">축소 -</button>
        </div>

        <p class="text-2xl mb-10 text-center leading-relaxed">
            "회장님, 우리 동아리에 대한 애정도를 테스트하겠습니다.<br>
            이 눈의 주인공은 <span class="text-yellow-400 font-bold underline">누구입니까?</span>"
        </p>

        <div class="flex flex-row gap-6 w-full justify-center max-w-[480px]">
            <button class="btn-option" onclick="processResult(true)">1. 정답</button>
            <button class="btn-option" onclick="processResult(false)">2. 오답</button>
        </div>
        
        <button onclick="showSetup()" class="mt-8 text-gray-600 text-sm hover:underline">설정 다시하기</button>
    </div>

    <!-- Impact Overlay -->
    <div id="impact-layer" class="impact-overlay" onclick="resetQuiz()">
        <div id="main-impact-text" class="shock-text narak-font">충격!!!</div>
        <div id="revealed-name" class="identity-label narak-font"></div>
        <div id="subtitle-container" class="subtitle-stack"></div>
        <p class="mt-16 text-gray-300 animate-pulse text-sm">화면을 클릭하면 다시 돌아갑니다</p>
    </div>

    <script type="module">
        // IndexedDB Wrapper for large file storage
        const DB_NAME = 'NarakQuizDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'quiz_assets';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveToDB(key, data) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.put(data, key);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getFromDB(key) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function clearDB() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                store.clear();
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        // Global State
        let currentScale = 3.5;
        const targetImg = document.getElementById('target-image');
        const failAudio = document.getElementById('fail-audio');
        const setupArea = document.getElementById('setup-area');
        const quizScreen = document.getElementById('quiz-screen');
        const saveSpinner = document.getElementById('save-spinner');
        const saveText = document.getElementById('save-text');
        const saveBtn = document.getElementById('save-btn');

        // Init on load
        window.addEventListener('DOMContentLoaded', async () => {
            const name = await getFromDB('target_name');
            const img = await getFromDB('target_image');
            const audio = await getFromDB('target_audio');

            if (name && img) {
                document.getElementById('target-name').value = name;
                applyData(name, img, audio);
                startQuiz();
            }
        });

        async function applyData(name, img, audio) {
            if (img) targetImg.src = img;
            if (audio) {
                failAudio.src = audio;
                failAudio.load();
            }
        }

        function startQuiz() {
            setupArea.style.display = 'none';
            quizScreen.classList.remove('hidden');
        }

        window.showSetup = function() {
            setupArea.style.display = 'flex';
            quizScreen.classList.add('hidden');
        };

        window.clearAllData = async function() {
            if(confirm("모든 사진과 사운드 데이터를 영구적으로 삭제하시겠습니까?")) {
                await clearDB();
                location.reload();
            }
        };

        const saveAllData = async function() {
            const nameInput = document.getElementById('target-name').value;
            const imgFile = document.getElementById('file-input').files[0];
            const audioFile = document.getElementById('audio-input').files[0];

            if (!nameInput) {
                alert("주인공 이름을 입력해주세요.");
                return;
            }

            saveSpinner.style.display = 'block';
            saveText.innerText = "파일 최적화 및 저장 중...";

            try {
                // Save Name
                await saveToDB('target_name', nameInput);

                // Process and Save Image
                let imgData = targetImg.src;
                if (imgFile) {
                    imgData = await fileToBase64(imgFile);
                    await saveToDB('target_image', imgData);
                }

                // Process and Save Audio
                let audioData = failAudio.src;
                if (audioFile) {
                    audioData = await fileToBase64(audioFile);
                    await saveToDB('target_audio', audioData);
                }

                applyData(nameInput, imgData, audioData);
                startQuiz();
            } catch (err) {
                console.error(err);
                alert("저장 중 오류가 발생했습니다. 파일 용량을 확인해주세요.");
            } finally {
                saveSpinner.style.display = 'none';
                saveText.innerText = "데이터 저장 및 시작하기";
            }
        };

        if (saveBtn) saveBtn.onclick = saveAllData;

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // --- UI Logic ---
        window.adjustZoom = function(amount) {
            currentScale += amount;
            if (currentScale < 1) currentScale = 1;
            targetImg.style.transform = `scale(${currentScale})`;
        };

        let isDragging = false;
        let startX, startY;
        let imgLeft = 0, imgTop = 0;

        targetImg.addEventListener('mousedown', (e) => {
            if(document.body.classList.contains('revealed')) return;
            isDragging = true;
            startX = e.clientX - imgLeft;
            startY = e.clientY - imgTop;
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            imgLeft = e.clientX - startX;
            imgTop = e.clientY - startY;
            targetImg.style.marginLeft = `${imgLeft}px`;
            targetImg.style.marginTop = `${imgTop}px`;
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        const wrongSubtitles = [
            "[충격! 회장, 1년 같이 활동한 부원 얼굴도 몰라...]",
            "[애정도 0% 확인. 회장에게 부원은 그저 배경일 뿐?]",
            "[이미 마음은 사퇴 결정? 부원 이름조차 가물가물]",
            "[사실은 부원들을 ATM처럼 번호표로 외우고 있는 중]"
        ];

        const correctSubtitles = [
            "[경악! 특정 부원의 눈만 유심히 관찰해왔나?]",
            "[회장의 은밀한 사심 포착? 이목구비 집착남 등극]",
            "[애정도 200% 달성! 부원 관찰이 일상인 참리더]"
        ];

        window.processResult = function(isCorrect) {
            const layer = document.getElementById('impact-layer');
            const container = document.getElementById('subtitle-container');
            const nameDisplay = document.getElementById('revealed-name');
            const mainText = document.getElementById('main-impact-text');
            const storedName = document.getElementById('target-name').value || "부원";
            
            container.innerHTML = '';
            document.body.classList.add('revealed');

            if (failAudio.src && failAudio.src.startsWith('data:')) {
                failAudio.currentTime = 0;
                failAudio.play().catch(console.error);
            }

            if (isCorrect) {
                mainText.innerText = "경악!!!";
                mainText.style.textShadow = "8px 8px 0 #0055ff"; 
            } else {
                mainText.innerText = "충격!!!";
                mainText.style.textShadow = "8px 8px 0 #ff0000";
            }

            nameDisplay.innerText = `정답: ${storedName}`;
            nameDisplay.style.display = 'block';

            const list = isCorrect ? correctSubtitles : wrongSubtitles;
            list.forEach((text, index) => {
                setTimeout(() => {
                    const box = document.createElement('div');
                    box.className = 'subtitle-box';
                    box.innerHTML = `<h2 class="text-xl md:text-3xl text-white font-bold">${text}</h2>`;
                    container.appendChild(box);
                    document.body.style.animation = "shake 0.3s cubic-bezier(.36,.07,.19,.97) both";
                    setTimeout(() => { document.body.style.animation = ""; }, 300);
                }, 1000 + (index * 600)); 
            });

            layer.style.display = 'flex';
        };

        window.resetQuiz = function() {
            document.getElementById('impact-layer').style.display = 'none';
            document.body.classList.remove('revealed');
            document.getElementById('revealed-name').style.display = 'none';
            failAudio.pause();
        };

    </script>
</body>
</html>
